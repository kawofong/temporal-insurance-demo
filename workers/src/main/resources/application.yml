spring:
  main:
    web-application-type: none
  application:
    name: insurance-workers
  temporal:
    connection:
      target: ${TEMPORAL_TARGET:localhost:7233}
    namespace: ${TEMPORAL_NAMESPACE:default}
    workers-auto-discovery:
      packages:
        - com.ziggy.insurance.domains
    workers:
      - task-queue: policy-task-queue
        capacity:
          max-concurrent-workflow-task-executors: 500
          max-concurrent-activity-executors: 500
          max-concurrent-local-activity-executors: 500
          max-concurrent-workflow-task-pollers: 20
          max-concurrent-activity-task-pollers: 20
      - task-queue: claim-task-queue
        capacity:
          max-concurrent-workflow-task-executors: 2000
          max-concurrent-activity-executors: 2000
          max-concurrent-local-activity-executors: 2000
          max-concurrent-workflow-task-pollers: 100
          max-concurrent-activity-task-pollers: 100
      - task-queue: notifications-task-queue
        capacity:
          max-concurrent-workflow-task-executors: 2000
          max-concurrent-activity-executors: 2000
          max-concurrent-local-activity-executors: 2000
          max-concurrent-nexus-task-executors: 2000
          max-concurrent-workflow-task-pollers: 100
          max-concurrent-activity-task-pollers: 100
          max-concurrent-nexus-task-pollers: 100
      - task-queue: payment-task-queue
        capacity:
          max-concurrent-workflow-task-executors: 2000
          max-concurrent-activity-executors: 2000
          max-concurrent-local-activity-executors: 2000
          max-concurrent-nexus-task-executors: 2000
          max-concurrent-workflow-task-pollers: 100
          max-concurrent-activity-task-pollers: 100
          max-concurrent-nexus-task-pollers: 100
