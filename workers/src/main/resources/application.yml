spring:
  main:
    web-application-type: none
  application:
    name: insurance-workers
  temporal:
    connection:
      target: ${TEMPORAL_TARGET:localhost:7233}
    namespace: ${TEMPORAL_NAMESPACE:default}
    workers-auto-discovery:
      packages:
        - com.ziggy.insurance.domains
    workers:
      - task-queue: policy-task-queue
      - task-queue: claim-task-queue
      # Hosts the notifications domain's Nexus service handler. The Nexus endpoint
      # 'notifications-ep' must be created on the server pointing here (see AGENTS.md).
      - task-queue: notifications-task-queue
      # Hosts the payment domain's Nexus service handler. The Nexus endpoint
      # 'payment-ep' must be created on the server pointing here (see AGENTS.md).
      - task-queue: payment-task-queue
