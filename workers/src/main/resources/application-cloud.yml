# Temporal Cloud connection overrides for the workers, active when SPRING_PROFILES_ACTIVE=cloud.
# Values are supplied by the gitignored .env.cloud file, loaded by mise (MISE_ENV=cloud).
# The worker capacity and auto-discovery config in application.yml is preserved (this profile
# only overrides the connection block).
spring:
  temporal:
    connection:
      # No defaults: startup fails loudly if .env.cloud is missing rather than silently
      # falling back to the local dev server.
      target: ${TEMPORAL_TARGET}
      api-key: ${TEMPORAL_API_KEY}
      enable-https: true
    namespace: ${TEMPORAL_NAMESPACE}
