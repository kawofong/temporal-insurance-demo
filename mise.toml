[tools]
java = "21.0.2"
gradle = "8.14.4"
node = "22"
temporal = "1.30.5"
python = "3.12"
uv = "latest"
"npm:@marp-team/marp-cli" = "4.4.0"

[tasks."temporal:dev"]
description = "Run a local Temporal dev server"
run = "temporal server start-dev --search-attribute policyHolderId=Keyword --search-attribute policyStatus=Keyword --search-attribute policyId=Keyword --search-attribute claimStatus=Keyword"

[tasks."temporal:cloud:setup"]
description = "Provision a Temporal Cloud namespace: register the search attributes and create the Nexus endpoints (reads credentials from .env.cloud, idempotent)"
run = """
if [ ! -f .env.cloud ]; then
  echo "Error: .env.cloud not found. Copy .env.cloud.example to .env.cloud and fill it in." >&2
  exit 1
fi
set -a
. ./.env.cloud
set +a
./scripts/demo-setup.sh --target cloud --setup-namespace-only
"""

[tasks."demo:setup"]
description = "Set up the demo environment: create Nexus endpoints and seed demo data (idempotent)"
run = "./scripts/demo-setup.sh"

[tasks."temporal:worker"]
description = "Run the Spring Boot Temporal worker against the local dev server"
run = "./gradlew :workers:bootRun"

[tasks."test"]
description = "Run all Java tests"
run = "./gradlew test"

[tasks."api"]
description = "Run the Spring Boot HTTP API server against the local dev server"
run = "./gradlew :api:bootRun"

[tasks."portal:install"]
description = "Install portal dependencies"
dir = "app"
run = "npm install"

[tasks."portal:dev"]
description = "Run portal dev server"
dir = "app"
run = "npm run dev"

[tasks."portal:build"]
description = "Build portal for production"
dir = "app"
run = "npm run build"

[tasks."agents:install"]
description = "Install Python agent dependencies with uv"
dir = "agents"
run = "uv sync"

[tasks."agents:worker"]
description = "Run the shared Temporal AI agents worker (requires a local Ollama server)"
dir = "agents"
run = "uv run python -m worker"

[tasks."agents:adjuster:starter"]
description = "Submit a sample claim to the field-adjuster agent and print its report"
dir = "agents"
run = "uv run python -m field_adjuster.starter"

[tasks."agents:claim:starter"]
description = "Submit a sample claim + policy to the claim-adjuster agent and print its determination"
dir = "agents"
run = "uv run python -m claim_adjuster.starter"

[tasks."slides"]
description = "Build presentation slides to docs/presentations"
run = "marp docs/presentations/presentation.md --html --output docs/presentations/presentation.html"

[tasks."slides:watch"]
description = "Serve presentation slides with live reload"
run = "marp --server docs/presentations/"
