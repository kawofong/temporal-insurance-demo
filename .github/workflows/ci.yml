name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests & coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # The repo pins Gradle via mise (gradle 8.14.4) and does not commit the wrapper jar,
      # so provision that exact version here and drive it with the `gradle` command.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.4'

      # Compile main + test sources up front so the timed step below measures test
      # execution only, not compilation.
      - name: Compile
        run: gradle testClasses --no-daemon

      # Budget: the unit tests should finish within ~5 minutes. `timeout-minutes: 5`
      # fails the job if they don't. The heavy in-process Temporal test servers put the
      # suite close to the old 3-minute cap even on main (it timed out there intermittently),
      # so the budget was raised to leave headroom as the suite grows. Tests run one module
      # at a time with two forks per module (`--no-parallel -PtestMaxParallelForks=2`) to
      # avoid oversubscribing the runner's cores; the test-retry plugin re-runs the occasional
      # flaky gRPC-deadline timeout. jacocoCoverageVerification then fails the build if
      # aggregated coverage drops below 80%.
      - name: Run unit tests & enforce 80% coverage
        timeout-minutes: 5
        run: >-
          gradle test jacocoCoverageVerification
          --no-daemon
          --no-parallel
          -PtestMaxParallelForks=2

      - name: Publish coverage summary
        if: ${{ !cancelled() }}
        run: |
          report="build/reports/jacoco/jacocoAggregatedReport/jacocoAggregatedReport.xml"
          if [ -f "$report" ]; then
            python3 - "$report" <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import sys, xml.etree.ElementTree as ET
          root = ET.parse(sys.argv[1]).getroot()
          print("## Aggregated test coverage\n")
          print("| Metric | Covered | Missed | Coverage |")
          print("|--------|---------|--------|----------|")
          for c in root.findall("counter"):
              t = c.get("type").title()
              covered, missed = int(c.get("covered")), int(c.get("missed"))
              total = covered + missed
              pct = (covered / total * 100) if total else 0.0
              print(f"| {t} | {covered} | {missed} | {pct:.1f}% |")
          PY
          fi

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: build/reports/jacoco/jacocoAggregatedReport
          if-no-files-found: warn

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests/test'
          if-no-files-found: warn
